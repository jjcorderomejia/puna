apiVersion: apps/v1
kind: Deployment
metadata:
  name: puna-redis
  namespace: puna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: puna-redis
  template:
    metadata:
      labels:
        app: puna-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["sh", "-c", "redis-server --save '' --appendonly no --requirepass $REDIS_PASSWORD"]
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: puna-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli --no-auth-warning -a $REDIS_PASSWORD ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: puna-redis
  namespace: puna
spec:
  selector:
    app: puna-redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None

apiVersion: apps/v1
kind: Deployment
metadata:
  name: puna-redis
  namespace: puna
spec:
  replicas: 1
  selector:
    matchLabels:
      app: puna-redis
  template:
    metadata:
      labels:
        app: puna-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: puna-redis
  namespace: puna
spec:
  selector:
    app: puna-redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None  # headless — accessed by name within namespace

name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR (OIDC)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Vendor Claudex
        run: ./vendor.sh

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/puna-claudex:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/puna-claudex:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/puna-claudex@${{ steps.build.outputs.digest }}
